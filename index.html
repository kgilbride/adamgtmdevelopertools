 {selector:'node.faded',style:{'opacity':0.07}},
 {selector:'edge.faded',style:{'opacity':0.05}},
];
types.forEach(t=>style.push({selector:'node[type="'+t+'"]',style:{'background-color':colorOf[t]}}));
const cy = cytoscape({container:document.getElementById('cy'),elements:{nodes,edges},style,wheelSensitivity:0.2});
cy.nodes().forEach(n=>{const d=14+3*Math.sqrt(n.degree(false));n.style('width',d);n.style('height',d);});
function layoutOpts(name){
 const m={cose:{name:'cose',animate:false,padding:30,nodeRepulsion:9000,idealEdgeLength:75},
  concentric:{name:'concentric',concentric:n=>n.degree(),levelWidth:()=>2,padding:30},
  'breadth-first':{name:'breadthfirst',directed:true,padding:30,spacingFactor:1.1},
  circle:{name:'circle',padding:30},grid:{name:'grid',padding:30}};
 return m[name]||m.cose;
}
function runLayout(n){cy.layout(layoutOpts(n)).run();}
runLayout('cose');
function resolveLink(baseDir,href){
 if(!href) return null; href=href.split('#')[0].split('?')[0].trim();
 if(!href.endsWith('.md')) return null;
 let path = href.startsWith('/') ? href.slice(1) : ((baseDir?baseDir+'/':'')+href);
 const parts=[]; path.split('/').forEach(s=>{ if(s===''||s==='.')return; if(s==='..'){parts.pop();}else parts.push(s);});
 let id=parts.join('/'); if(id.endsWith('.md')) id=id.slice(0,-3); return id;
}
function relList(label,ids){
 if(!ids.length) return '';
 return '<div class="rel"><h4>'+label+' ('+ids.length+')</h4>'+ids.map(id=>{const c=C[id];return '<a class="jump" data-id="'+esc(id)+'">'+esc(c?c.title:id)+'</a>';}).join('')+'</div>';
}
// Sortable member-tool table (returns a live DOM element)
function memberTable(ids){
 let key='agent_readiness', dir=-1;
 const wrap=document.createElement('div'); wrap.className='rel';
 function cmp(a,b){
  if(key==='title'){const x=(a.title||'').toLowerCase(),y=(b.title||'').toLowerCase();return x<y?-dir:x>y?dir:0;}
  const x=a[key],y=b[key], nx=(x===null||x===undefined),ny=(y===null||y===undefined);
  if(nx&&ny)return 0; if(nx)return 1; if(ny)return -1;   // nulls always last
  return (x<y?-1:x>y?1:0)*dir;
 }
 function render(){
  const rows=ids.map(id=>C[id]).sort(cmp);
  const hd=(k,lbl,num)=>'<th data-k="'+k+'"'+(num?' class="num"':'')+(k===key?(dir<0?' sdesc':' sasc'):'')+'>'+lbl+'</th>';
  wrap.innerHTML='<h4>Tools ('+ids.length+') — click a header to sort</h4>'+
   '<table class="mtab"><thead><tr>'+hd('title','Tool',false)+hd('agent_readiness','Readiness',true)+hd('panel_sov','SOV',true)+'</tr></thead><tbody>'+
   rows.map(c=>'<tr><td><a class="jump" data-id="'+esc(c.id)+'">'+esc(c.title)+'</a></td>'+
     '<td class="num">'+fmt(c.agent_readiness)+(c.agent_readiness_grade?(' '+esc(c.agent_readiness_grade)):'')+'</td>'+
     '<td class="num">'+fmt(c.panel_sov)+'</td></tr>').join('')+'</tbody></table>';
  wrap.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{
   const k=th.dataset.k; if(k===key){dir=-dir;}else{key=k;dir=(k==='title')?1:-1;} render();
  }));
  wrap.querySelectorAll('a.jump').forEach(a=>a.addEventListener('click',()=>select(a.dataset.id)));
 }
 render(); return wrap;
}
function select(id){
 const c=C[id]; if(!c) return;
 cy.nodes().removeClass('sel'); const n=cy.getElementById(id); n.addClass('sel');
 cy.batch(()=>{ const keep=n.closedNeighborhood(); cy.elements().addClass('faded'); keep.removeClass('faded'); });
 if(n.style('display')!=='none') cy.animate({center:{eles:n}},{duration:250});
 const uniq=a=>[...new Set(a)];
 const back=uniq(DATA.edges.filter(e=>e.target===id).map(e=>e.source));
 const out=uniq(DATA.edges.filter(e=>e.source===id).map(e=>e.target));
 const memberTools=back.filter(x=>C[x]&&C[x].type==='Tool');
 const otherBack=back.filter(x=>!memberTools.includes(x));
 const chip='<span class="badge" style="background:'+(colorOf[c.type]||'#888')+'">'+esc(c.type)+'</span>';
 let h='<div class="dtitle">'+esc(c.title||c.id)+' '+chip+'</div><div class="cid">'+esc(c.id)+'</div>';
 if(c.description) h+='<p class="desc">'+esc(c.description)+'</p>';
 if(c.source) h+='<div class="srcrow">Source: <a href="'+esc(c.source)+'" target="_blank" rel="noopener">'+esc(shortUrl(c.source))+' ↗</a></div>';
 if(c.resource) h+='<div class="srcrow"><a href="'+esc(c.resource)+'" target="_blank" rel="noopener">resource ↗</a></div>';
 if(c.tags&&c.tags.length) h+='<div class="tags">'+c.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>';
 h+='<div id="mtabslot"></div>';
 h+=relList('Links to',out);
 if(otherBack.length) h+=relList('Cited by',otherBack);
 h+='<div class="body" id="dbody"></div>';
 const d=document.getElementById('detail'); d.innerHTML=h;
 if(memberTools.length) d.querySelector('#mtabslot').appendChild(memberTable(memberTools));
 const bodyEl=document.getElementById('dbody'); bodyEl.innerHTML=marked.parse(c.body||'');
 bodyEl.querySelectorAll('a').forEach(a=>{
  const tid=resolveLink(c.dir,a.getAttribute('href')||'');
  if(tid&&C[tid]){a.classList.add('xlink');a.addEventListener('click',ev=>{ev.preventDefault();select(tid);});}
  else{a.target='_blank';a.rel='noopener';}
 });
 d.querySelectorAll('a.jump').forEach(a=>{ if(a.closest('#mtabslot'))return; a.addEventListener('click',()=>select(a.dataset.id)); });
}
cy.on('tap','node',e=>select(e.target.id()));
cy.on('tap',e=>{ if(e.target===cy){ cy.elements().removeClass('faded'); cy.nodes().removeClass('sel'); } });
const search=document.getElementById('search');
search.addEventListener('input',()=>{
 const q=search.value.trim().toLowerCase();
 cy.elements().removeClass('faded'); cy.nodes().removeClass('sel');
 cy.batch(()=>{
  cy.nodes().forEach(n=>{const c=C[n.id()];const hay=[c.title,c.id,(c.tags||[]).join(' ')].join(' ').toLowerCase();n.toggleClass('dim',!!q&&!hay.includes(q));});
  cy.edges().forEach(e=>e.toggleClass('dim',e.source().hasClass('dim')||e.target().hasClass('dim')));
 });
});
document.getElementById('layout').addEventListener('change',e=>runLayout(e.target.value));
const tf=document.getElementById('typefilters');
tf.innerHTML=types.map(t=>'<label class="tfl"><input type="checkbox" checked value="'+esc(t)+'"><span class="sw" style="background:'+colorOf[t]+'"></span>'+esc(t)+'</label>').join('');
const boxes=[...tf.querySelectorAll('input')];
function applyFilter(){
 const active=new Set(boxes.filter(b=>b.checked).map(b=>b.value));
 cy.batch(()=>{
  cy.nodes().forEach(n=>n.style('display',active.has(C[n.id()].type)?'element':'none'));
  cy.edges().forEach(e=>e.style('display',(e.source().style('display')!=='none'&&e.target().style('display')!=='none')?'element':'none'));
 });
}
boxes.forEach(b=>b.addEventListener('change',applyFilter));
</script></body></html>
